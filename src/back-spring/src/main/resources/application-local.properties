server.port=8080
server.servlet.context-path=/api

spring.datasource.url=jdbc:h2:file:./nckhdb_local;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

app.security.jwt.secret=0123456789abcdef0123456789abcdef
app.security.jwt.access-expiration-ms=900000
app.security.jwt.refresh-expiration-ms=604800000

app.cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://localhost:3000
