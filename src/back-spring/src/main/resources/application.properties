spring.application.name=back-spring

server.port=${PORT:8080}
server.servlet.context-path=/api

spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/nckh?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

app.security.jwt.secret=${JWT_SECRET:change_me_to_long_random_secret_key_at_least_32_bytes}
app.security.jwt.access-expiration-ms=${JWT_ACCESS_EXPIRATION_MS:900000}
app.security.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
